<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरा अपना चैटजीपीटी</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; height: 100vh; background-color: #ffffff; color: #000000; display: flex; flex-direction: column; overflow: hidden; }

        /* हेडर (Header) डिज़ाइन */
        .header { background-color: #ffffff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5e5; }
        .header-title { font-size: 18px; font-weight: bold; }
        .icon-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: #000000; padding: 0 5px; }

        /* साइडबार (Sidebar - History) डिज़ाइन */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background-color: #f9f9f9; border-right: 1px solid #e5e5e5; transition: left 0.3s ease; z-index: 1000; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5e5; }
        .new-chat-btn { width: 90%; margin: 15px auto; padding: 10px; background-color: #007aff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .history-item { background: transparent; border: none; padding: 12px; text-align: left; font-size: 15px; cursor: pointer; border-radius: 5px; color: #333; }
        .history-item:hover { background-color: #e5e5e5; }

        /* बैकग्राउंड को धुंधला करने वाला ओवरले (Overlay) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.show { display: block; }

        /* चैट एरिया (Chat Area) */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; background-color: #ffffff; }
        .message { max-width: 85%; padding: 12px 16px; line-height: 1.5; font-size: 16px; }
        .user-msg { background-color: #f4f4f4; color: #000000; align-self: flex-end; border-radius: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bot-msg { background-color: #ffffff; color: #000000; align-self: flex-start; width: 100%; padding-left: 0; white-space: pre-wrap; }

        /* इनपुट बॉक्स (Input Box) */
        .input-container { padding: 12px; background-color: #ffffff; border-top: 1px solid #e5e5e5; }
        .input-box { display: flex; background-color: #f4f4f4; border-radius: 25px; padding: 8px 16px; align-items: center; border: 1px solid #e5e5e5; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #000000; outline: none; font-size: 16px; padding: 5px; }
        button.send-btn { background: #007aff; border: none; color: white; cursor: pointer; padding: 8px 16px; border-radius: 20px; font-weight: bold; margin-left: 5px; }
        button.send-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <strong>चैट हिस्ट्री</strong>
            <button class="icon-btn" onclick="closeSidebar()">×</button>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">+ नई चैट</button>
        <div id="historyList" class="history-list"></div>
    </div>
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <div class="header">
        <button class="icon-btn" onclick="openSidebar()">☰</button>
        <span class="header-title">ChatGPT 3.5</span>
        <button class="icon-btn" onclick="startNewChat()">📝</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-msg">नमस्ते अविनाश! मैं आपकी कैसे मदद कर सकता हूँ?</div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Reply to ChatGPT..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6LdoVZ6r97dm7GAu7SMiwknDSryHnWkvmQIxx5-xWA0mw";
        let currentChatId = Date.now();

        window.onload = function() {
            renderHistory();
        };

        function openSidebar() {
            document.getElementById("sidebar").classList.add("open");
            document.getElementById("overlay").classList.add("show");
            renderHistory();
        }

        function closeSidebar() {
            document.getElementById("sidebar").classList.remove("open");
            document.getElementById("overlay").classList.remove("show");
        }

        function startNewChat() {
            currentChatId = Date.now();
            document.getElementById("chatArea").innerHTML = '<div class="message bot-msg">नमस्ते अविनाश! मैं आपकी कैसे मदद कर सकता हूँ?</div>';
            closeSidebar();
        }

        function saveCurrentChat() {
            let history = JSON.parse(localStorage.getItem("myChatHistory")) || {};
            history[currentChatId] = document.getElementById("chatArea").innerHTML;
            localStorage.setItem("myChatHistory", JSON.stringify(history));
            renderHistory();
        }

        function loadChat(id) {
            let history = JSON.parse(localStorage.getItem("myChatHistory")) || {};
            if(history[id]) {
                document.getElementById("chatArea").innerHTML = history[id];
                currentChatId = id;
                closeSidebar();
            }
        }

        function renderHistory() {
            let historyList = document.getElementById("historyList");
            historyList.innerHTML = "";
            let history = JSON.parse(localStorage.getItem("myChatHistory")) || {};
            let keys = Object.keys(history).reverse();

            keys.forEach(key => {
                let btn = document.createElement("button");
                btn.className = "history-item";
                let dateStr = new Date(parseInt(key)).toLocaleString('hi-IN', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'});
                btn.innerText = "💬 " + dateStr;
                btn.onclick = () => loadChat(key);
                historyList.appendChild(btn);
            });
        }

        async function sendMessage() {
            let input = document.getElementById("userInput");
            let chatArea = document.getElementById("chatArea");
            let userText = input.value.trim();

            if (userText !== "") {
                let userMsg = document.createElement("div");
                userMsg.className = "message user-msg";
                userMsg.innerText = userText;
                chatArea.appendChild(userMsg);
                
                input.value = "";
                chatArea.scrollTop = chatArea.scrollHeight;
                
                saveCurrentChat(); 

                let botMsg = document.createElement("div");
                botMsg.className = "message bot-msg";
                botMsg.innerText = "सोच रहा हूँ...";
                chatArea.appendChild(botMsg);

                // यह वह छिपा हुआ नियम है जो एआई को हमेशा हिंदी (देवनागरी) में जवाब देने के लिए बाध्य करेगा
                let forcedPrompt = "You must strictly reply in Hindi language using Devanagari script only. Do not use English alphabet. User query: " + userText;

                try {
                    let response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: forcedPrompt }] }]
                        })
                    });

                    let data = await response.json();
                    
                    if (data.error) {
                        botMsg.innerText = "गूगल एपीआई एरर: " + data.error.message;
                    } else {
                        function extractText(obj) {
                            if (typeof obj === 'string') return obj;
                            if (Array.isArray(obj)) {
                                for (let item of obj) {
                                    let t = extractText(item);
                                    if (t) return t;
                                }
                            } else if (typeof obj === 'object' && obj !== null) {
                                if (obj.text) return obj.text;
                                for (let key in obj) {
                                    let t = extractText(obj[key]);
                                    if (t) return t;
                                }
                            }
                            return "";
                        }

                        let aiText = extractText(data);
                        if (aiText) {
                            botMsg.innerText = aiText;
                        } else {
                            botMsg.innerText = "जवाब का डेटा खाली आया है।";
                        }
                    }

                } catch (error) {
                    botMsg.innerText = "नेटवर्क एरर: " + error.message;
                }
                
                chatArea.scrollTop = chatArea.scrollHeight;
                saveCurrentChat(); 
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
