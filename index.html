<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>मेरा अपना चैटजीपीटी</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f9f9f9; height: 100vh; overflow: hidden; }
        .header { background-color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; font-weight: bold; font-size: 18px; }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; }
        .chat-area { height: calc(100vh - 130px); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 16px; line-height: 1.4; position: relative; }
        .bot-message { align-self: flex-start; background-color: #e9ecef; color: #000; border-bottom-left-radius: 0; }
        .user-message { align-self: flex-end; background-color: #007bff; color: #fff; border-bottom-right-radius: 0; }
        .input-area { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 15px; background-color: #fff; border-top: 1px solid #ccc; display: flex; gap: 10px; box-sizing: border-box; }
        .input-box { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; outline: none; }
        .send-btn { background-color: #007bff; color: #fff; border: none; padding: 0 20px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div>ChatGPT 3.5</div>
    </div>
    <div class="chat-area" id="chatbox">
        <div class="message bot-message">नमस्ते अविनाश! मैं आपकी कैसे मदद कर सकता हूँ?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" class="input-box" placeholder="मैसेज टाइप करें...">
        <button onclick="sendMessage()" class="send-btn">Send</button>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6JUY20DDBZilYTqlhdeVs5wiiAxwe5McIUqkdlHpMTWFg"; 
        // नया फॉर्मेट: चाबी को सीधे हेडर में भेज रहे हैं
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";
        
        async function sendMessage() {
            const text = document.getElementById("userInput").value.trim();
            if (!text) return;

            document.getElementById("chatbox").innerHTML += `<div class="message user-message">${text}</div>`;
            document.getElementById("userInput").value = "";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "x-goog-api-key": API_KEY 
                    },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text + " (कृपया हिंदी देवनागरी में जवाब दें)" }] }] })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById("chatbox").innerHTML += `<div class="message bot-message" style="color: red;">एरर: ${data.error.message}</div>`;
                } else {
                    const botReply = data.candidates.content.parts.text;
                    document.getElementById("chatbox").innerHTML += `<div class="message bot-message">${botReply}</div>`;
                }
            } catch (error) {
                document.getElementById("chatbox").innerHTML += `<div class="message bot-message" style="color: red;">नेटवर्क एरर आया है।</div>`;
            }
        }
    </script>
</body>
</html>
